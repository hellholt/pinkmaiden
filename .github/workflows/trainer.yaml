name: Build Trainer Image

on:
  push:
    branches: [main]
    paths:
      - 'labeler/Dockerfile.train'
      - 'labeler/requirements-train.txt'
      - 'labeler/train.py'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: labeler
          file: labeler/Dockerfile.train
          push: true
          tags: |
            ghcr.io/hellholt/pinkmaiden-trainer:${{ github.run_number }}-${{ github.sha }}
            ghcr.io/hellholt/pinkmaiden-trainer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
